package:
  name: augment
  version: 0.1.0

source:
  # Update sha256 after creating the matching GitHub tag.
  url: https://github.com/travisthieme/augment/archive/refs/tags/v0.1.0.tar.gz
  sha256: PUT_SHA256_HERE

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - setuptools-scm
    - wheel
  run:
    - python >=3.11
    - numpy >=2.3
    - scipy >=1.15
    - astropy >=7
    - matplotlib-base >=3.10
    - corner >=2.2

test:
  imports:
    - augment
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/travisthieme/augment
  summary: A Python package for propagating asymmetric uncertainties through Astropy-unit-aware Monte Carlo simulations.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - travisthieme
